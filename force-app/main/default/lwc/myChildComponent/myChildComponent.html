<template>
    <template if:true={hasContacts}>
        <div class="slds-grid slds-wrap">
            <template for:each={contacts} for:item="contact">
                <div key={contact.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-around_xx-small">
                    <div class="slds-box slds-theme_shade slds-p-around_small">
                        <p class="slds-text-heading_small">{contact.Name}</p>
                        <p class="slds-text-body_small">
                            <template if:true={contact.Email}>
                                <strong>Email:</strong> {contact.Email}
                                <br />
                            </template>
                            <template if:true={contact.Phone}>
                                <strong>Phone:</strong> {contact.Phone}
                            </template>
                        </p>
                    </div>
                </div>
            </template>
        </div>
    </template>
    <template if:false={hasContacts}>
        <p class="slds-text-body_small slds-text-color_weak">No contacts available for this account.</p>
    </template>
</template>
